hecklist:
  - name: CheckWS02_OK
    eager: False
    check:
      - type: CheckWeatherStation
        index: 2
      - type: CheckInstrumentFlag
        instrument: weatherstations_02
        mode: 1
        flag: READY
    responses:
      - type: SetInstrumentFlag
        instrument: weatherstations_02
        flag: 1

  - name: CheckWS02_NOTOK
    eager: False
    check:
      - type: CheckWeatherStation
        index: 2
        mode: 1
      - type: CheckInstrumentFlag
        instrument: weatherstations_02
        mode: 1
        flag: CLOSE
    responses:
      - type: SetInstrumentFlag
        instrument: weatherstations_02
        flag: 3
