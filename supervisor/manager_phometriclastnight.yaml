checklist:
  - name: PhometricLastNight
    eager: False
    eager_response: False
    active: True
    comment: Calculate the variability of the stars for main survey observations.
    check:
      - type: CheckTime
        mode: 4
        deltaTime: 0.5
    responses:
      - type: ExecuteScript
        filename: /mnt/public/t80s_scripts/scripts/darknight_lastnight.sh
      - type: SendTelegram
        message: Last night MS variability
      - type: SendPhoto
        path: /mnt/public/herpich/darknight/photo.png
