checklist:
  CloseTelescope:
    active: false
    conditions:
    - condition: ask_operator
      question: Completely close the telescope?
      timeout: 2m
    responses:
    - action: telescope
      do: close_cover
    - action: dome
      do: close_slit
    - action: stop_all
    - action: fan
      do: switch_off
      fan: /CSKFan/DomeFanEast
    - action: fan
      do: switch_off
      fan: /CSKFan/DomeFanWest
    - action: fan
      do: switch_off
      fan: /SchneiderOTBFan/M1
    - action: dome
      do: slew
      azimuth: 90.0
  ParkTelescope:
    active: false
    conditions:
    - condition: ask_operator
      question: Park telescope?
      timeout: 2m
    responses:
    - action: stop_all
    - action: fan
      do: switch_off
      fan: /CSKFan/DomeFanEast
    - action: fan
      do: switch_off
      fan: /CSKFan/DomeFanWest
    - action: fan
      do: switch_off
      fan: /SchneiderOTBFan/M1
    - action: telescope
      do: close_cover
    - action: dome
      do: close_slit
    - action: dome
      do: slew
      azimuth: 90.0
    - action: telescope
      do: park
